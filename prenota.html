<section>

<div class="container">

<h2>Prenota il tuo Ombrellone</h2>

<form id="bookingForm">

<label>Data</label>
<input type="date" id="data" required>

<label>Mese</label>

<select id="mese">

<option value="Luglio">Luglio</option>

<option value="Agosto">Agosto</option>

</select>

<label>Lettini Extra</label>

<input type="number" id="lettini" value="0" min="0">

<label>Sdraio</label>

<input type="number" id="sdraio" value="0" min="0">

<label>Pouf</label>

<input type="number" id="pouf" value="0" min="0">

<h2 id="totale">Totale: €18</h2>

<button type="button" class="btn" onclick="prenota()">

Invia su WhatsApp

</button>

</form>

</div>

</section>
